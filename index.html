<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Software Engineering Study Guide</title>
    <link rel="icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/index.css" />
</head>
<body class="page">
    <header class="header">
        <h1 class="header__title">
            <a href="#home" class="header__link">Flash Cards</a>
        </h1>
        <nav class="nav">
            <ul class="nav__links">
                <li><a href="#home" class="nav__link">My Decks</a></li>
                <li><a href="#about" class="nav__link">About</a></li>
            </ul>
        </nav>
    </header>

    <main class="page__main-content">
        <section class="gallery" id="home">
            <h2 class="gallery__title">My Decks</h2>
            <div class="gallery__wrapping-row">
                <ul class="gallery__list"></ul>
                <button type="button" class="card gallery__new-card-btn">
                    + New card
                </button>
            </div>
        </section>

        <section class="gallery" id="deck-view" style="display: none;">
            <div class="gallery__header">
                <h2 class="gallery__title"></h2> 
                <button type="button" class="gallery__practice-btn">Practice</button>
            </div>
            <div class="gallery__wrapping-row">
                <ul class="gallery__list"></ul>
                <button type="button" class="card gallery__new-card-btn gallery__new-card-btn_location_deck-view">
                    + New card
                </button>
            </div>
        </section>

        <section class="carousel" id="carousel-view" style="display: none;">
            <h2 class="carousel__title"></h2>
            <div class="carousel__grid">
                <button class="carousel__btn carousel__btn_type_left" type="button" aria-label="Previous card"></button>
                <div class="carousel__card">
                    <p class="carousel__card-text"></p>
                </div>
                <button class="carousel__btn carousel__btn_type_right" type="button" aria-label="Next card"></button>
                <button class="carousel__btn carousel__btn_type_flip" type="button" aria-label="Flip card"></button>
            </div>
        </section>

        <section class="new-deck-view" id="new-deck-view" style="display: none;">
            <h2 class="new-deck-view__title">New Deck</h2>
            <form class="new-deck-view__form" id="new-deck-form">
              
              <label class="new-deck-view__label">
                Deck Name
                <input type="text" name="name" class="new-deck-view__input" placeholder="Enter deck name" required />
              </label>

              <fieldset class="color-picker">
                <legend class="color-picker__legend">Pick the deck color</legend>
                <div class="color-picker__options">
                  <input type="radio" name="color" value="green" id="color-green" class="color-picker__radio" checked>
                  <label for="color-green" class="color-picker__label color-picker__label_color_green"></label>
          
                  <input type="radio" name="color" value="blue" id="color-blue" class="color-picker__radio">
                  <label for="color-blue" class="color-picker__label color-picker__label_color_blue"></label>
          
                  <input type="radio" name="color" value="purple" id="color-purple" class="color-picker__radio">
                  <label for="color-purple" class="color-picker__label color-picker__label_color_purple"></label>
          
                  <input type="radio" name="color" value="pink" id="color-pink" class="color-picker__radio">
                  <label for="color-pink" class="color-picker__label color-picker__label_color_pink"></label>
          
                  <input type="radio" name="color" value="orange" id="color-orange" class="color-picker__radio">
                  <label for="color-orange" class="color-picker__label color-picker__label_color_orange"></label>
          
                  <input type="radio" name="color" value="yellow" id="color-yellow" class="color-picker__radio">
                  <label for="color-yellow" class="color-picker__label color-picker__label_color_yellow"></label>
                </div>
              </fieldset>
          
              <label class="new-deck-view__label">
                Write the JSON array of cards
                <textarea class="new-deck-view__textarea" name="cards" placeholder='{ "cards": [] }' required></textarea>
              </label>
          
              <button type="submit" class="new-deck-view__submit-btn" disabled>Create the Deck</button>
            </form>
          </section>

        <section id="not-found" style="display: none;">
            <h2 class="gallery__title">404 - Not Found</h2>
            <p>Oops! This page doesn't exist.</p>
            <a href="#home" class="nav__link">Return to Home</a>
        </section>

        <template id="card-template">
            <li class="card card_color_green">
                <a href="#" class="card__link"></a>
                <h3 class="card__title"></h3>
                <div class="card__row">
                    <p class="card__count"></p>
                    <button class="card__delete-btn" type="button" aria-label="Delete this card"></button>
                </div>
            </li>
        </template>

        <template id="flashcard-template">
            <li class="card card_color_green">
                <h3 class="card__title"></h3>
                <div class="card__row">
                    <button type="button" class="card__edit-btn" aria-label="Edit flashcard"></button>
                    <button class="card__delete-btn" type="button" aria-label="Delete flashcard"></button>
                </div>
            </li>
        </template>
    </main>

    <footer class="footer">
        <p class="footer__text">&copy; 2026 Hailey Cantu</p>
    </footer> 

    <div id="error-modal" class="modal">
      <div class="modal__content">
        <h2 class="modal__title">Invalid Input</h2>
        <p id="error-message" class="modal__text"></p>
        <button id="close-error-modal" class="button modal__button" type="button">Dismiss</button>
      </div>
    </div>

    <script src="./assets/js/index.js" type="module"></script>
</body>
</html>
